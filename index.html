<!DOCTYPE html>

<head>
    <title>Neil Wang poetry</title>
</head>
<body>
    <h1>Poetry<h1>
        <p>Frozenm wind cuts sharp against my <strong>face</strong>,</p>
        <p>The trees stad bare and broken in the <u>snow</u>,</p>
        <p>Sun hides like a stranger from this place,</p>
        <p>and not a single living creature can <mark>grow</mark>.</p>
</body>
